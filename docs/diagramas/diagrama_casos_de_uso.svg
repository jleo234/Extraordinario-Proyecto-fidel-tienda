<svg width="1040" height="620" viewBox="0 0 1040 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6B5D4F" stroke-width="1.3"/>
    </marker>
  </defs>
  <rect width="1040" height="620" fill="#FFFFFF"/>
  <text x="520" y="28" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2B231A">Diagrama de Casos de Uso — Cliente de la Tienda en Línea</text>

  <!-- Actor -->
  <g>
    <circle cx="65" cy="300" r="16" fill="none" stroke="#2B231A" stroke-width="2"/>
    <line x1="65" y1="316" x2="65" y2="360" stroke="#2B231A" stroke-width="2"/>
    <line x1="40" y1="335" x2="90" y2="335" stroke="#2B231A" stroke-width="2"/>
    <line x1="65" y1="360" x2="45" y2="390" stroke="#2B231A" stroke-width="2"/>
    <line x1="65" y1="360" x2="85" y2="390" stroke="#2B231A" stroke-width="2"/>
    <text x="65" y="408" text-anchor="middle" font-family="Arial" font-size="12" font-weight="700" fill="#2B231A">Cliente</text>
  </g>

  <!-- recuadro del sistema -->
  <rect x="160" y="55" width="860" height="480" rx="14" fill="#FBF4E9" stroke="#E6D9C3" stroke-width="1.5"/>
  <text x="590" y="80" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#2B231A">Sistema de Tienda en Línea</text>

  <!-- óvalos de casos de uso -->
  <g font-family="Arial" font-size="11" fill="#712B13">
    <ellipse cx="280" cy="125" rx="90" ry="26" fill="#FAECE7" stroke="#C1502E"/>
    <text x="280" y="129" text-anchor="middle">Registrarse</text>

    <ellipse cx="480" cy="125" rx="95" ry="26" fill="#FAECE7" stroke="#C1502E"/>
    <text x="480" y="129" text-anchor="middle">Iniciar sesión</text>

    <ellipse cx="700" cy="125" rx="110" ry="26" fill="#E6F1FB" stroke="#185FA5"/>
    <text x="700" y="129" text-anchor="middle" fill="#042C53">Consultar catálogo</text>

    <ellipse cx="920" cy="125" rx="80" ry="26" fill="#E6F1FB" stroke="#185FA5"/>
    <text x="920" y="129" text-anchor="middle" fill="#042C53">Filtrar / ordenar</text>

    <ellipse cx="270" cy="215" rx="105" ry="26" fill="#EAF3DE" stroke="#3B6D11"/>
    <text x="270" y="219" text-anchor="middle" fill="#173404">Agregar al carrito</text>

    <ellipse cx="500" cy="215" rx="95" ry="26" fill="#EAF3DE" stroke="#3B6D11"/>
    <text x="500" y="219" text-anchor="middle" fill="#173404">Modificar cantidad</text>

    <ellipse cx="710" cy="215" rx="100" ry="26" fill="#EAF3DE" stroke="#3B6D11"/>
    <text x="710" y="219" text-anchor="middle" fill="#173404">Eliminar del carrito</text>

    <ellipse cx="320" cy="305" rx="135" ry="26" fill="#FBEAF0" stroke="#993556"/>
    <text x="320" y="309" text-anchor="middle" fill="#4B1528">Registrar dirección de envío</text>

    <ellipse cx="580" cy="305" rx="105" ry="26" fill="#FBEAF0" stroke="#993556"/>
    <text x="580" y="309" text-anchor="middle" fill="#4B1528">Confirmar compra</text>

    <ellipse cx="320" cy="395" rx="140" ry="26" fill="#FAEEDA" stroke="#854F0B"/>
    <text x="320" y="399" text-anchor="middle" fill="#412402">Consultar historial de pedidos</text>
  </g>

  <!-- líneas actor -> casos principales (rectas, sin cruzar óvalos) -->
  <line x1="90" y1="290" x2="195" y2="135" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="294" x2="390" y2="130" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="298" x2="595" y2="128" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="300" x2="815" y2="128" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="304" x2="170" y2="215" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="306" x2="410" y2="218" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="308" x2="615" y2="218" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="310" x2="190" y2="305" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="312" x2="480" y2="308" stroke="#6B5D4F" stroke-width="1"/>
  <line x1="90" y1="316" x2="190" y2="395" stroke="#6B5D4F" stroke-width="1"/>

  <!-- dependencias entre casos de uso (debajo de la fila correspondiente, sin tocar texto) -->
  <line x1="270" y1="241" x2="430" y2="148" stroke="#9C3E22" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow3)"/>
  <text x="330" y="180" font-family="Arial" font-size="9" fill="#9C3E22" font-style="italic">«requiere»</text>

  <line x1="580" y1="331" x2="350" y2="320" stroke="#9C3E22" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow3)"/>
  <text x="430" y="350" font-family="Arial" font-size="9" fill="#9C3E22" font-style="italic">«requiere»</text>

  <line x1="580" y1="279" x2="320" y2="241" stroke="#9C3E22" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow3)"/>
  <text x="500" y="265" font-family="Arial" font-size="9" fill="#9C3E22" font-style="italic">«incluye»</text>

  <text x="180" y="555" font-family="Arial" font-size="10" fill="#6B5D4F" font-style="italic">Líneas continuas: relación actor–caso de uso. Líneas punteadas: relaciones «requiere» / «incluye» entre casos de uso.</text>
</svg>
