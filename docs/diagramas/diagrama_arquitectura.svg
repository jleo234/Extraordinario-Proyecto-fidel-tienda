<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2B231A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="900" height="420" fill="#FFFFFF"/>

  <text x="450" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2B231A">Arquitectura del Sistema — Tienda en Línea</text>

  <rect x="40" y="60" width="240" height="100" rx="12" fill="#E4EEDF" stroke="#4C7A55" stroke-width="1.5"/>
  <text x="160" y="85" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#27500A">CAPA DE PRESENTACIÓN</text>
  <text x="160" y="108" text-anchor="middle" font-family="Arial" font-size="12" fill="#27500A">Navegador Web</text>
  <text x="160" y="126" text-anchor="middle" font-family="Arial" font-size="11" fill="#27500A">HTML + CSS + JavaScript</text>
  <text x="160" y="144" text-anchor="middle" font-family="Arial" font-size="11" fill="#27500A">(fetch / peticiones HTTP)</text>

  <rect x="330" y="60" width="240" height="100" rx="12" fill="#FAECE7" stroke="#C1502E" stroke-width="1.5"/>
  <text x="450" y="85" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#712B13">CAPA DE LÓGICA DE NEGOCIO</text>
  <text x="450" y="108" text-anchor="middle" font-family="Arial" font-size="12" fill="#712B13">Node.js + Express</text>
  <text x="450" y="126" text-anchor="middle" font-family="Arial" font-size="11" fill="#712B13">Rutas · Middleware JWT</text>
  <text x="450" y="144" text-anchor="middle" font-family="Arial" font-size="11" fill="#712B13">Controladores</text>

  <rect x="620" y="60" width="240" height="100" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="740" y="85" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#042C53">CAPA DE DATOS</text>
  <text x="740" y="108" text-anchor="middle" font-family="Arial" font-size="12" fill="#042C53">MySQL</text>
  <text x="740" y="126" text-anchor="middle" font-family="Arial" font-size="11" fill="#042C53">Base de datos: tienda_online</text>
  <text x="740" y="144" text-anchor="middle" font-family="Arial" font-size="11" fill="#042C53">(mysql2 / pool de conexiones)</text>

  <line x1="280" y1="110" x2="328" y2="110" stroke="#2B231A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="304" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B5D4F">JSON</text>

  <line x1="328" y1="135" x2="280" y2="135" stroke="#2B231A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="570" y1="110" x2="618" y2="110" stroke="#2B231A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="594" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B5D4F">SQL</text>

  <line x1="618" y1="135" x2="570" y2="135" stroke="#2B231A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="210" width="820" height="180" rx="12" fill="#FBF4E9" stroke="#E6D9C3" stroke-width="1"/>
  <text x="450" y="235" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#2B231A">Módulos de la capa de lógica de negocio (backend)</text>

  <g>
    <rect x="65"  y="255" width="150" height="60" rx="8" fill="#FFFFFF" stroke="#E6D9C3"/>
    <text x="140" y="280" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#2B231A">authController</text>
    <text x="140" y="298" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B5D4F">Registro / Login (JWT)</text>

    <rect x="230" y="255" width="150" height="60" rx="8" fill="#FFFFFF" stroke="#E6D9C3"/>
    <text x="305" y="280" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#2B231A">productoController</text>
    <text x="305" y="298" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B5D4F">Catálogo y filtros</text>

    <rect x="395" y="255" width="150" height="60" rx="8" fill="#FFFFFF" stroke="#E6D9C3"/>
    <text x="470" y="280" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#2B231A">carritoController</text>
    <text x="470" y="298" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B5D4F">Carrito de compras</text>

    <rect x="560" y="255" width="150" height="60" rx="8" fill="#FFFFFF" stroke="#E6D9C3"/>
    <text x="635" y="280" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#2B231A">pedidoController</text>
    <text x="635" y="298" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B5D4F">Checkout / Stock</text>

    <rect x="725" y="255" width="115" height="60" rx="8" fill="#FFFFFF" stroke="#E6D9C3"/>
    <text x="782" y="280" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#2B231A">direccionController</text>
    <text x="782" y="298" text-anchor="middle" font-family="Arial" font-size="10" fill="#6B5D4F">Envíos</text>
  </g>

  <text x="450" y="345" text-anchor="middle" font-family="Arial" font-size="11" fill="#6B5D4F">Middleware de autenticación (auth.js) protege las rutas: /carrito, /pedidos y /direcciones</text>
  <text x="450" y="365" text-anchor="middle" font-family="Arial" font-size="11" fill="#6B5D4F">Todas las consultas a la base de datos usan un pool de conexiones (mysql2/promise)</text>
</svg>
