version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: tienda_online_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: tienda_online
    ports:
      - "3306:3306"
    volumes:
      - tienda_mysql_data:/var/lib/mysql
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  tienda_mysql_data:
